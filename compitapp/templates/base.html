<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompitAPP 📚</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #4f46e5; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b;
            --text-muted: #64748b; --border: #e2e8f0; --radius: 12px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .navbar { background: var(--primary); color: white; padding: 0 16px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(79,70,229,0.3); gap: 10px; }
        .navbar h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
        .sync-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .studente-bar { background: #3730a3; padding: 6px 16px; display: flex; align-items: center; gap: 8px; overflow-x: auto; }
        .studente-chip { padding: 4px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; white-space: nowrap; text-decoration: none; display: inline-block; }
        .studente-chip.active { background: white; color: var(--primary); }
        .studente-chip.inactive { background: rgba(255,255,255,0.15); color: white; }
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid var(--border); overflow-x: auto; }
        .nav-tabs a { padding: 10px 16px; text-decoration: none; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .nav-tabs a.active { color: var(--primary); border-bottom-color: var(--primary); }
        .container { padding: 16px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .card-title { font-size: 0.95rem; font-weight: 700; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-primary { background: #ede9fe; color: var(--primary); }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger  { background: #fee2e2; color: var(--danger); }
        .materia-tag { display: inline-block; background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
        .compito-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
        .compito-item:last-child { border-bottom: none; }
        .compito-testo { font-size: 0.88rem; line-height: 1.5; margin-top: 4px; white-space: pre-line; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-card { background: white; border-radius: var(--radius); padding: 14px; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
        .empty-state { text-align: center; padding: 24px; color: var(--text-muted); font-size: 0.9rem; }
        .voto-chip { display: inline-block; width: 40px; height: 40px; border-radius: 50%; text-align: center; line-height: 40px; font-weight: 800; font-size: 1rem; }
        .voto-ok   { background: #d1fae5; color: #065f46; }
        .voto-warn { background: #fef3c7; color: #92400e; }
        .voto-bad  { background: #fee2e2; color: #991b1b; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; display: none; z-index: 999; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>📚 CompitAPP</h1>
    <button class="sync-btn" onclick="syncNow()">🔄 Sync</button>
</div>

{% if studenti is defined and studenti|length > 1 %}
<div class="studente-bar">
    {% for s in studenti %}
    <a href="{{ request.path }}?studente={{ s.nome }}"
       class="studente-chip {{ 'active' if s.nome == studente_sel else 'inactive' }}">
        🎒 {{ s.nome }}
    </a>
    {% endfor %}
</div>
{% endif %}

<div class="nav-tabs" id="nav-tabs">
    <a href="#" onclick="navTo('/')" class="{{ 'active' if request.path == '/' }}">🏠 Oggi</a>
    <a href="#" onclick="navTo('/calendario')" class="{{ 'active' if request.path == '/calendario' }}">📅 Calendario</a>
    <a href="#" onclick="navTo('/voti')" class="{{ 'active' if request.path == '/voti' }}">📊 Voti</a>
    <a href="#" onclick="navTo('/orario')" class="{{ 'active' if request.path == '/orario' }}">🗓️ Orario</a>
    <a href="#" onclick="navTo('/bacheca')" class="{{ 'active' if request.path == '/bacheca' }}">📢 Bacheca</a>
    <a href="#" onclick="navTo('/assenze')" class="{{ 'active' if request.path == '/assenze' }}">🏠 Assenze</a>
    <a href="#" onclick="navTo('/argomenti')" class="{{ 'active' if request.path == '/argomenti' }}">📖 Lezioni</a>
    <a href="#" onclick="navTo('/configurazione')" class="{{ 'active' if request.path == '/configurazione' }}">⚙️ Config</a>
</div>

{% block content %}{% endblock %}

<div class="toast" id="toast"></div>
<script>
function navTo(page) {
    // Usa path relativi — funziona sempre sia con Ingress che senza
    const studente = new URLSearchParams(window.location.search).get('studente') || '';
    // Torna alla root del sito corrente e aggiungi il path
    const base = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '');
    const url = base + page + (studente ? '?studente=' + encodeURIComponent(studente) : '');
    window.location.href = url;
    return false;
}

function showToast(msg, ms=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', ms);
}
async function syncNow() {
    showToast('⏳ Sincronizzazione...');
    try {
        const r = await fetch('./api/sync', {method:'POST'});
        if (r.ok) { showToast('✅ Sync completato!'); setTimeout(() => location.reload(), 1500); }
        else showToast('❌ Errore sync');
    } catch(e) { showToast('❌ Errore connessione'); }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
